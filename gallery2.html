    <!-- Modern Lightbox Modal (Hidden by default) -->
    <div id="lightbox" class="fixed inset-0 bg-stone-950/95 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 ease-in-out" onclick="closeLightbox(event)">
        <button onclick="closeLightbox(event)" class="absolute top-6 right-6 text-stone-400 hover:text-white transition-colors text-sm uppercase tracking-widest focus:outline-none z-50">Close [×]</button>
        
        <div class="w-full max-w-5xl p-4 flex flex-col items-center">
            
            <img id="lightbox-img" src="" alt="" class="max-w-full max-h-[80vh] object-contain shadow-2xl hidden">
            
            <div id="lightbox-video-container" class="w-full aspect-video hidden shadow-2xl rounded-sm overflow-hidden bg-black">
                <iframe id="lightbox-video" src="" class="w-full h-full" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
            </div>

            <p id="lightbox-caption" class="text-stone-300 font-light mt-4 text-sm tracking-wide"></p>
        </div>
    </div>

    <!-- Lightbox Script -->
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxVideoContainer = document.getElementById('lightbox-video-container');
        const lightboxVideo = document.getElementById('lightbox-video');
        const lightboxCaption = document.getElementById('lightbox-caption');

        // Handles standard photos
        function openLightbox(element) {
            const img = element.querySelector('img');
            
            // Hide video, show image
            lightboxVideoContainer.classList.add('hidden');
            lightboxImg.classList.remove('hidden');
            
            lightboxImg.src = img.src;
            lightboxCaption.textContent = img.alt;
            
            lightbox.classList.remove('opacity-0', 'pointer-events-none');
        }

        // Handles YouTube videos
        function openVideoLightbox(videoId, title) {
            // Hide image, show video
            lightboxImg.classList.add('hidden');
            lightboxVideoContainer.classList.remove('hidden');
            
            // Adding ?autoplay=1 ensures it plays automatically when opened
            lightboxVideo.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
            lightboxCaption.textContent = title;
            
            lightbox.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeLightbox(event) {
            // Prevent closing if clicking directly on the video player
            if (event && event.target === lightboxVideoContainer) return;

            lightbox.classList.add('opacity-0', 'pointer-events-none');
            
            // Wait for fade out, then clear sources to stop video audio
            setTimeout(() => { 
                lightboxImg.src = ''; 
                lightboxVideo.src = ''; 
            }, 300);
        }

        // Close lightbox if 'Escape' key is pressed
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
